[module/i3]
    margins = 2

    type = internal/i3

    pin-workspaces = true

    fuzzy-match = true

    ws-icon-0 = 1;¯»è
    ws-icon-1 = 2;´ë¿
    ws-icon-2 = 3;¯À▒
    ws-icon-3 = 4;¯À«
    ws-icon-4 = 5;¯À¡
    ws-icon-5 = 6;¯À░
    ws-icon-6 = 7;¯Ü¡
    ws-icon-7 = 8;¯Öì
    ws-icon-8 = 9;¾░Ö»
    ws-icon-9 = 10;´å╝

    ws-icon-default = ¾░úç

    ; Available tags:
    ;   <label-state> (default) - gets replaced with <label-(focused|unfocused|visible|urgent)>
    ;   <label-mode> (default)
    format = <label-state> <label-mode>

    ; Available tokens:
    ;   %mode%
    ; Default: %mode%
    label-mode = %mode%
    label-mode-padding = ${variables.margins}
    label-mode-background = ${colors.background-alt}

    ; Available tokens:
    ;   %name%
    ;   %icon%
    ;   %index%
    ;   %output%
    ; Default: %icon% %name%
    label-focused = %{T2}%icon% 
    label-focused-foreground = ${colors.primary}
    label-focused-background = ${colors.background-alt}
    label-focused-padding = ${variables.margins}

    label-unfocused = %{T2}%icon% 
    label-unfocused-foreground = ${colors.foreground-alt}
    label-unfocused-background = ${colors.background-alt}
    label-unfocused-padding = ${variables.margins}

    label-visible = %{T2}%icon% 
    label-visible-foreground = ${colors.primary}
    label-visible-background = ${colors.background-alt}
    label-visible-padding = ${variables.margins}

    label-urgent = %{T2}%icon% 
    label-urgent-foreground = ${colors.red}
    label-urgent-background = ${colors.background-alt}
    label-urgent-padding = ${variables.margins}

[module/xworkspaces]
    type = internal/xworkspaces

    label-active = %name%
    label-active-background = ${colors.background-alt}
    label-active-underline= ${colors.primary}
    label-active-padding = 1

    label-occupied = %name%
    label-occupied-padding = 1

    label-urgent = %name%
    label-urgent-background = ${colors.alert}
    label-urgent-padding = 1

    label-empty = %name%
    label-empty-foreground = ${colors.disabled}
    label-empty-padding = 1

[module/xwindow]
    type = internal/xwindow
    label = %class% - %title%
    label-maxlen = 30
    label-background = ${colors.background-alt}
    label-foreground = ${colors.foreground}
    label-empty = Empty
    label-empty-background = ${colors.background-alt}
    label-empty-foreground = ${colors.foreground}

    format-prefix = "´ïÆ  "
    format-prefix-foreground = ${colors.primary}
    format-prefix-background = ${colors.background-alt}

[module/pulseaudio]
    type = internal/pulseaudio

    format-volume-prefix = "¾░ò¥ "
    format-volume-prefix-foreground = ${colors.primary}
    format-volume-prefix-background = ${colors.background-alt}
    format-volume = <label-volume>

    label-volume = %percentage%%
    label-volume-background = ${colors.background-alt}

    label-muted = muted
    label-muted-foreground = ${colors.disabled}
    label-muted-background = ${colors.background-alt}

[module/xkeyboard]
    type = internal/xkeyboard

    blacklist-0 = num lock
    blacklist-1 = scroll lock
    blacklist-2 = caps lock

    label-layout = %layout%
    format-prefix = "´ä£  "
    format-prefix-foreground = ${colors.primary}
    format-prefix-background = ${colors.background-alt}

    label-layout-foreground = ${colors.foreground}
    label-layout-background = ${colors.background-alt}
    label-indicator-padding = 2
    label-indicator-margin = 1

[module/memory]
    type = internal/memory
    interval = 2
    format-prefix = "´ïø "
    format-prefix-foreground = ${colors.primary}
    format-prefix-background = ${colors.background-alt}

    label-foreground = ${colors.foreground}
    label-background = ${colors.background-alt}
    label = %percentage_used:2%%

[module/cpu]
    type = internal/cpu
    interval = 2
    format-prefix = "´Æ╝ "
    format-prefix-background = ${colors.background-alt}

    label-foreground = ${colors.foreground}
    label-background = ${colors.background-alt}
    format-prefix-foreground = ${colors.primary}
    label = %percentage:2%%

[module/clock]
    type = internal/date
    interval = 1

    date = %H:%M:%S

    format-prefix-foreground = ${colors.primary}
    format-prefix-background = ${colors.background-alt}
    format-prefix = "´É║  "

    label = %date%
    label-foreground = ${colors.foreground}
    label-background = ${colors.background-alt}

[module/date]
    type = internal/date
    interval = 1

    date = %d.%m.%Y

    format-prefix-foreground = ${colors.primary}
    format-prefix-background = ${colors.background-alt}
    format-prefix = "´æò  "

    label = %date%
    label-foreground = ${colors.foreground}
    label-background = ${colors.background-alt}

[module/battery]
    type = internal/battery
    time-format = %H:%M
    battery = BAT0
    adapter = ADP1

    format-charging = <animation-charging> <label-charging>
    format-discharging = <ramp-capacity> <label-discharging>
    format-charging-foreground = ${colors.primary}
    format-charging-background = ${colors.background-alt}

    format-discharging-background = ${colors.background-alt}
    format-discharging-foreground = ${colors.primary}

    label-charging = ´âº %percentage%%
    label-discharging = %percentage%%
    label-discharging-foreground = ${colors.foreground}
    label-full = %percentage%%
    label-full-background = ${colors.background-alt}
    label-low = ¾░Ç¿ %percentage%%

    ramp-capacity-0 = ´ëä
    ramp-capacity-1 = ´ëâ
    ramp-capacity-2 = ´ëé
    ramp-capacity-3 = ´ëü
    ramp-capacity-4 = ´ëÇ
    bar-capacity-width = 10
    animation-charging-0 = ´ëä
    animation-charging-1 = ´ëâ
    animation-charging-2 = ´ëé
    animation-charging-3 = ´ëü
    animation-charging-4 = ´ëÇ
    animation-charging-framerate = 750
    animation-discharging-0 = ´ëÇ
    animation-discharging-1 = ´ëü
    animation-discharging-2 = ´ëé
    animation-discharging-3 = ´ëâ
    animation-discharging-4 = ´ëä
    animation-discharging-framerate = 500
    animation-low-0 = !
    animation-low-1 =
    animation-low-framerate = 200

[module/tray]
    type = internal/tray
    format-background = ${colors.background-alt}

    tray-position = right
    tray-detached = false
    tray-background = ${colors.background-alt}
    tray-maxsize = 16
    tray-offset-x = 0
    tray-offset-y = 0
    tray-spacing = 7px
    tray-scale = 1.0
